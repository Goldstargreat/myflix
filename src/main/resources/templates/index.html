<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('홈')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="hero">
    <div class="hero-content">
        <p class="hero-eyebrow">오늘의 추천작</p>
        <h1 class="hero-title">인터스텔라</h1>
        <p class="hero-desc">우주 탐험과 시간의 상대성을 다룬 SF 대작.<br>인류 생존을 위해 웜홀을 통과하는 우주비행사들의 이야기.</p>
        <div class="hero-buttons">
            <a th:href="@{/movies/1}" class="btn-primary">▶ 상세보기</a>
            <a th:href="@{/movies}" class="btn-secondary">전체 목록</a>
        </div>
    </div>
</div>

<div class="section">
    <h2 class="section-title">모든 콘텐츠</h2>
    <div class="movie-grid">
        <a th:each="movie : ${movies}" th:href="@{/movies/{id}(id=${movie.id})}" class="movie-card">
            <div class="movie-thumb">
                <img th:src="${movie.thumbnailUrl}" th:alt="${movie.title}"
                     onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400&h=600&fit=crop'">
                <div class="movie-overlay">
                    <span class="genre-badge" th:text="${movie.genre}"></span>
                    <span class="rating">★ <span th:text="${movie.rating}"></span></span>
                </div>
            </div>
            <div class="movie-info">
                <p class="movie-title" th:text="${movie.title}"></p>
                <p class="movie-year" th:text="${movie.releaseYear}"></p>
            </div>
        </a>
    </div>
</div>

<footer class="footer">
    <p>© 2026 MyFlix. 한국폴리텍 인공소프트웨어</p>
</footer>

</body>
</html>
