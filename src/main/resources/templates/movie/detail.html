<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${movie.title})}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- 히어로 섹션 -->
<div class="detail-hero"
     th:style="'background-image: linear-gradient(to right, rgba(0,0,0,0.95) 40%, rgba(0,0,0,0.3)), url(' + ${movie.thumbnailUrl} + ')'">
    <div class="detail-content">
        <p class="hero-eyebrow" th:text="${movie.genre}"></p>
        <h1 class="detail-title" th:text="${movie.title}"></h1>

        <div class="detail-meta">
            <span class="rating-large">⭐ TMDB <span th:text="${movie.rating}"></span></span>
            <span class="year" th:text="${movie.releaseYear} + '년'"></span>
        </div>

        <p class="detail-desc" th:text="${movie.description}"></p>

        <div class="detail-actions">
            <a th:href="@{/movies}" class="btn-secondary">← 목록으로</a>

            <!-- 찜하기 버튼 (로그인한 경우만) -->
            <form th:if="${loggedIn}" th:action="@{/wish/toggle/{id}(id=${movie.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn-wish"
                        th:classappend="${isWished} ? ' wished'"
                        th:text="${isWished} ? '❤ 찜 해제' : '🤍 찜하기'">
                </button>
            </form>
        </div>
    </div>
</div>

<!-- 리뷰 섹션 -->
<div class="section review-section" sec:authorize="isAuthenticated()">
    <div class="review-container">

        <!-- 새 리뷰 작성 폼 -->
        <div class="my-review-form">
            <h3>리뷰 작성</h3>
            <form th:action="@{/review/save/{id}(id=${movie.id})}" method="post">
                <div class="rating-input">
                    <label>내 별점</label>
                    <input type="number" name="myRating" step="0.5" min="0.5" max="10"
                           value="7.0" required style="width:80px;">
                    <span>/ 10</span>
                </div>
                <div class="comment-input">
                    <label>한줄평 <span class="char-limit">(150자 이내)</span></label>
                    <textarea name="comment" maxlength="150" rows="3"
                              placeholder="이 작품에 대한 한줄평을 남겨보세요."></textarea>
                    <div class="char-counter"><span id="charCount">0</span> / 150</div>
                </div>
                <button type="submit" class="btn-primary">작성하기</button>
            </form>
        </div>

        <!-- 전체 리뷰 목록 -->
        <div class="all-reviews" th:if="${!#lists.isEmpty(reviews)}">
            <h3>전체 리뷰 <span class="review-count" th:text="'(' + ${#lists.size(reviews)} + ')'"></span></h3>
            <div th:each="review : ${reviews}" class="review-card">
                <div class="review-header">
                    <span class="review-username" th:text="${review.username}"></span>
                    <span class="review-rating">⭐ <span th:text="${review.myRating}"></span></span>
                    <!-- 내 리뷰에만 수정/삭제 버튼 -->
                    <span th:if="${#authentication.name == review.username}" style="margin-left:auto; display:flex; gap:0.5rem;">
                        <!-- 수정 버튼 클릭 시 수정 폼 토글 -->
                        <button class="btn-secondary" style="font-size:0.8rem; padding:4px 10px;"
                                th:onclick="'toggleEdit(' + ${review.id} + ')'">수정</button>
                        <!-- 삭제 버튼 -->
                        <form th:action="@{/review/delete/{id}(id=${review.id})}" method="post" style="display:inline;">
                            <input type="hidden" name="movieId" th:value="${movie.id}">
                            <button type="submit" class="btn-delete"
                                    onclick="return confirm('리뷰를 삭제하시겠습니까?')">삭제</button>
                        </form>
                    </span>
                </div>
                <p class="review-comment" th:text="${review.comment}"></p>

                <!-- 인라인 수정 폼 (기본 숨김) -->
                <div th:if="${#authentication.name == review.username}"
                     th:id="'edit-form-' + ${review.id}" style="display:none; margin-top:0.5rem;">
                    <form th:action="@{/review/update/{id}(id=${review.id})}" method="post">
                        <input type="hidden" name="movieId" th:value="${movie.id}">
                        <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:0.5rem;">
                            <label>별점</label>
                            <input type="number" name="myRating" step="0.5" min="0.5" max="10"
                                   th:value="${review.myRating}" required style="width:70px;">
                        </div>
                        <textarea name="comment" maxlength="150" rows="2"
                                  th:text="${review.comment}" style="width:100%;"></textarea>
                        <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                            <button type="submit" class="btn-primary" style="padding:5px 12px; font-size:0.85rem;">저장</button>
                            <button type="button" class="btn-secondary" style="padding:5px 12px; font-size:0.85rem;"
                                    th:onclick="'toggleEdit(' + ${review.id} + ')'">취소</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="all-reviews" th:if="${#lists.isEmpty(reviews)}">
            <p class="no-review">아직 리뷰가 없습니다. 첫 번째 리뷰를 남겨보세요!</p>
        </div>

    </div>
</div>

<!-- 비로그인 안내 -->
<div class="section" sec:authorize="!isAuthenticated()">
    <div class="login-prompt">
        <p>리뷰 작성 및 찜하기는 로그인 후 이용할 수 있습니다.</p>
        <a th:href="@{/auth/login}" class="btn-primary">로그인하러 가기</a>
    </div>
</div>

<footer class="footer">
    <p>© 2026 MyFlix. 인공지능소프트웨어</p>
</footer>

<script>
    // 글자수 카운터
    const textarea = document.querySelector('textarea[name="comment"]');
    const counter = document.getElementById('charCount');
    if (textarea && counter) {
        counter.textContent = textarea.value.length;
        textarea.addEventListener('input', () => {
            counter.textContent = textarea.value.length;
        });
    }

    // 수정 폼 토글
    function toggleEdit(reviewId) {
        const form = document.getElementById('edit-form-' + reviewId);
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
</script>

</body>
</html>
