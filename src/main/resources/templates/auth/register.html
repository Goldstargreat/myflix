<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('회원가입')}"></head>
<body class="auth-body">

<div class="auth-container">
    <a th:href="@{/}" class="logo auth-logo">MyFlix</a>
    <div class="auth-box">
        <h2>회원가입</h2>
        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>
        <form th:action="@{/auth/register}" method="post">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="아이디 (4자 이상)" required minlength="4">
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호 (6자 이상)" required minlength="6">
            </div>
            <button type="submit" class="btn-full">회원가입</button>
        </form>
        <p class="auth-link">이미 계정이 있으신가요? <a th:href="@{/auth/login}">로그인</a></p>
    </div>
</div>

</body>
</html>
